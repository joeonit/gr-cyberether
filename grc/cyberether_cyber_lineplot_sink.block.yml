id: cyberether_cyber_lineplot_sink
label: CyberEther Line Plot Sink
category: '[cyberether]'

parameters:
- id: type
  label: Input Type
  dtype: enum
  options: [complex, float]
  option_labels: [Complex, Float]
  option_attributes:
    fcn:     [cyber_lineplot_sink_c, cyber_lineplot_sink_f]
    in_type: [complex,               float]
  hide: part

- id: name
  label: Plot Name
  dtype: string
  default: '"lineplot"'

- id: buffer_size
  label: Buffer Size
  dtype: int
  default: '4096'

inputs:
- label: in
  domain: stream
  dtype: ${type.in_type}

templates:
  imports: from gnuradio import cyberether
  make: cyberether.${type.fcn}(${buffer_size}, ${name})

file_format: 1
