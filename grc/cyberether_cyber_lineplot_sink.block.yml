id: cyberether_cyber_lineplot_sink
label: CyberEther Line Plot Sink
category: '[cyberether]'

parameters:
- id: type
  label: Input Type
  dtype: enum
  options: [complex, float]
  option_labels: [Complex, Float]
  option_attributes:
    fcn:     [cyber_lineplot_sink_c, cyber_lineplot_sink_f]
    in_type: [complex,               float]
  hide: part

- id: name
  label: Plot Name
  dtype: string
  default: '"lineplot"'

- id: buffer_size
  label: Buffer Size
  dtype: int
  default: '4096'

- id: display
  label: Display Domain
  dtype: enum
  default: Time
  options: [Time, Frequency]
  option_labels: [Time (scope), Frequency (spectrum)]

- id: gui_hint
  label: GUI Hint
  dtype: string
  default: '""'
  hide: part

inputs:
- label: in
  domain: stream
  dtype: ${type.in_type}

templates:
  imports: from gnuradio import cyberether
  make: cyberether.${type.fcn}(${buffer_size}, ${name}, cyberether.Domain.${display}, ${gui_hint})

documentation: |-
  GUI Hint places this plot in the shared CyberEther window grid,
  qtgui-style: "row, col" or "row, col, row_span, col_span" (zero-based
  cells). Leave empty to auto-place in a near-square grid. Example: a
  waterfall with hint "0, 0, 1, 2" spans the top row while two unhinted
  scopes fill the row below.

file_format: 1
